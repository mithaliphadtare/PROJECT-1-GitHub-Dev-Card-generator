<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GitHub Dev Card Generator</title>
    <style>
        :root {
            --bg-color: #0d1117;
            --card-bg: #161b22;
            --text-color: #c9d1d9;
            --accent-color: #58a6ff;
            --success-color: #238636;
            --success-hover: #2ea043;
            --border-color: #30363d;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
            margin: 0;
            padding: 40px 20px;
            background-color: var(--bg-color);
            color: var(--text-color);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 80vh;
        }

        .container {
            max-width: 550px;
            width: 100%;
            background: var(--card-bg);
            padding: 40px;
            border-radius: 12px;
            border: 1px solid var(--border-color);
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.3);
        }

        h1 {
            color: #ffffff;
            font-size: 26px;
            margin: 0 0 10px 0;
            font-weight: 600;
            text-align: center;
        }

        .subtitle {
            color: #8b949e;
            font-size: 14px;
            margin-bottom: 30px;
            text-align: center;
        }

        .input-group {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-bottom: 30px;
        }

        .input-wrapper {
            position: relative;
            width: 100%;
        }

        .input-wrapper span {
            position: absolute;
            left: 14px;
            top: 50%;
            transform: translateY(-50%);
            color: #8b949e;
            font-size: 16px;
            font-weight: 500;
        }

        .input-group input[type="text"] {
            width: 100%;
            box-sizing: border-box;
            padding: 14px 14px 14px 35px;
            background-color: var(--bg-color);
            border: 1px solid var(--border-color);
            border-radius: 6px;
            color: #ffffff;
            font-size: 16px;
            transition: border-color 0.2s ease;
        }

        .input-group input[type="text"]:focus {
            outline: none;
            border-color: var(--accent-color);
            box-shadow: 0 0 0 3px rgba(88, 166, 255, 0.15);
        }

        .input-group button {
            background-color: var(--success-color);
            color: #ffffff;
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 16px;
            font-weight: 600;
            transition: background-color 0.2s ease, transform 0.1s ease;
        }

        .input-group button:hover {
            background-color: var(--success-hover);
        }

        .input-group button:active {
            transform: scale(0.99);
        }

        #card-display {
            margin-top: 10px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .placeholder-text {
            color: #8b949e;
            font-style: italic;
            text-align: center;
            font-size: 14px;
        }

        /* Beautiful Dynamic Card Style Layout */
        .github-card {
            background: linear-gradient(135deg, #1f242c 0%, #161b22 100%);
            border: 1px solid var(--border-color);
            padding: 25px;
            border-radius: 10px;
            width: 100%;
            box-sizing: border-box;
            position: relative;
            overflow: hidden;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
        }

        .github-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 4px;
            background: linear-gradient(90deg, #58a6ff, #bc8cff);
        }

        .card-header {
            display: flex;
            align-items: center;
            gap: 15px;
            border-bottom: 1px solid rgba(48, 54, 61, 0.6);
            padding-bottom: 15px;
            margin-bottom: 15px;
        }

        .avatar-placeholder {
            width: 48px;
            height: 48px;
            background: #21262d;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 22px;
            border: 1px solid var(--border-color);
        }

        .user-title h3 {
            margin: 0;
            color: #ffffff;
            font-size: 18px;
        }

        .user-title p {
            margin: 4px 0 0 0;
            color: var(--accent-color);
            font-size: 13px;
            font-weight: 500;
        }

        .bio {
            background: rgba(13, 17, 23, 0.4);
            padding: 14px;
            border-radius: 6px;
            border-left: 3px solid #bc8cff;
            margin-bottom: 15px;
            color: #8b949e;
            font-size: 14px;
            line-height: 1.5;
            font-style: italic;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
        }

        .stat-item {
            background: #21262d;
            padding: 12px 15px;
            border-radius: 6px;
            border: 1px solid rgba(48, 54, 61, 0.5);
        }

        .stat-label {
            font-size: 11px;
            color: #8b949e;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 4px;
        }

        .stat-value {
            font-size: 16px;
            font-weight: bold;
            color: #ffffff;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        /* Loading Spinner Animation */
        .spinner {
            width: 28px;
            height: 28px;
            border: 3px solid rgba(88, 166, 255, 0.1);
            border-top-color: var(--accent-color);
            border-radius: 50%;
            animation: spin 1s infinite linear;
            margin: 20px 0;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>GitHub Dev Card Generator</h1>
        <p class="subtitle">Generate beautiful visual cards for your developer profile metrics</p>
        
        <div class="input-group">
            <div class="input-wrapper">
                <span>@</span>
                <input type="text" id="github-username" placeholder="username" value="mithaliphadtare">
            </div>
            <button onclick="generateCard()">Generate Dev Card</button>
        </div>

        <div id="card-display">
            <p class="placeholder-text">Enter your GitHub account details to construct your card workspace.</p>
        </div>
    </div>

    <script>
        async function generateCard() {
            const username = document.getElementById('github-username').value.trim();
            if (!username) {
                alert('Please enter a valid GitHub username!');
                return;
            }

            // Polished loading animation state
            document.getElementById('card-display').innerHTML = '<div class="spinner"></div>';

            try {
                // Connects dynamically to your active backend port
                const response = await fetch(`http://127.0.0.1:8000/generate-card?username=${username}`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    }
                });
                
                const data = await response.json();

                if (response.ok && data.status === "Success") {
                    const rawData = data.data;
                    
                    // Regex sorting rules to extract raw text fields safely
                    const bioMatch = rawData.match(/Bio:\s*([\s\S]*?)(?=\n\w+:|$)/);
                    const reposMatch = rawData.match(/Public Repos:\s*(\d+)/);
                    const followersMatch = rawData.match(/Followers:\s*(\d+)/);

                    const userBio = bioMatch ? bioMatch[1].trim() : "No profile bio available.";
                    const publicRepos = reposMatch ? reposMatch[1] : "0";
                    const followersCount = followersMatch ? followersMatch[1] : "0";

                    // Inject the gorgeous visual component block
                    document.getElementById('card-display').innerHTML = `
                        <div class="github-card">
                            <div class="card-header">
                                <div class="avatar-placeholder">💻</div>
                                <div class="user-title">
                                    <h3>${username}</h3>
                                    <p>Verified GitHub Developer</p>
                                </div>
                            </div>
                            <div class="card-body">
                                <div class="bio">"${userBio}"</div>
                                <div class="stats-grid">
                                    <div class="stat-item">
                                        <div class="stat-label">Repositories</div>
                                        <div class="stat-value">📦 ${publicRepos}</div>
                                    </div>
                                    <div class="stat-item">
                                        <div class="stat-label">Followers</div>
                                        <div class="stat-value">👥 ${followersCount}</div>
                                    </div>
                                </div>
                            </div>
                        </div>`;
                } else {
                    document.getElementById('card-display').innerHTML = `<p style="color: #f85149; font-size: 14px;">Backend Error: ${data.message || 'Unknown issue occurred.'}</p>`;
                }
            } catch (error) {
                console.error('Error:', error);
                document.getElementById('card-display').innerHTML = `<p style="color: #f85149; font-size: 14px;">Unable to talk to your local backend. Ensure your VS Code terminal server is active.</p>`;
            }
        }
    </script>
</body>
</html>
